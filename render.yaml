services:
  - type: web
    name: agrimarket-backend
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrimarket-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: agrimarket-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: agrimarket-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: agrimarket-db
    databaseName: agrimarket
    user: agrimarket_user
    plan: free
    region: frankfurt
    postgresMajorVersion: 15
