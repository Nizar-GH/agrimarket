services:
  - type: web
    name: agrimarket-backend
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrimarket-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: agrimarket-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: agrimarket-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: static_site
    name: agrimarket-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    publishDirectory: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://agrimarket-backend.onrender.com/api"
      - key: VITE_USE_MOCK_DATA
        value: "false"

databases:
  - name: agrimarket-db
    databaseName: agrimarket
    user: agrimarket_user
    plan: free
    region: frankfurt
    postgresMajorVersion: 15
